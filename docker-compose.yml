services:
  postgres:
    image: postgres:16-alpine
    container_name: s2q_interview_postgres
    environment:
      POSTGRES_DB: interview_test
      POSTGRES_USER: interview_user
      POSTGRES_PASSWORD: interview_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interview_user -d interview_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
